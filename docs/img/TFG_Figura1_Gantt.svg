<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" width="680" height="400" font-family="Arial, sans-serif">

  <!-- Fondo blanco para evitar problemas al exportar -->
  <rect x="0" y="0" width="680" height="400" fill="#FFFFFF"/>

  <!-- Título y subtítulo -->
  <text x="340" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C2C2A">Diagrama de Gantt — Trabajo de Fin de Ciclo</text>
  <text x="340" y="40" text-anchor="middle" font-size="10" fill="#5F5E5A">Planificación temporal de los nueve bloques de trabajo (mayo–junio 2026)</text>

  <!-- Cabecera: meses -->
  <text x="305" y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="#444441">Mayo</text>
  <text x="515" y="60" text-anchor="middle" font-size="11" font-weight="bold" fill="#444441">Junio</text>

  <!-- Separador visual mes -->
  <line x1="410" y1="64" x2="410" y2="358" stroke="#888780" stroke-width="0.6" stroke-dasharray="2,2"/>

  <!-- Cabecera: números de día -->
  <text x="215" y="78" text-anchor="middle" font-size="10" fill="#5F5E5A">25</text>
  <text x="245" y="78" text-anchor="middle" font-size="10" fill="#5F5E5A">26</text>
  <text x="275" y="78" text-anchor="middle" font-size="10" fill="#5F5E5A">27</text>
  <text x="305" y="78" text-anchor="middle" font-size="10" fill="#5F5E5A">28</text>
  <text x="335" y="78" text-anchor="middle" font-size="10" fill="#5F5E5A">29</text>
  <text x="365" y="78" text-anchor="middle" font-size="10" fill="#5F5E5A">30</text>
  <text x="395" y="78" text-anchor="middle" font-size="10" fill="#5F5E5A">31</text>
  <text x="425" y="78" text-anchor="middle" font-size="10" fill="#5F5E5A">1</text>
  <text x="455" y="78" text-anchor="middle" font-size="10" fill="#5F5E5A">2</text>
  <text x="485" y="78" text-anchor="middle" font-size="10" fill="#5F5E5A">3</text>
  <text x="515" y="78" text-anchor="middle" font-size="10" fill="#5F5E5A">4</text>
  <text x="545" y="78" text-anchor="middle" font-size="10" fill="#5F5E5A">5</text>
  <text x="575" y="78" text-anchor="middle" font-size="10" fill="#5F5E5A">6</text>
  <text x="605" y="78" text-anchor="middle" font-size="10" fill="#5F5E5A">7</text>

  <!-- Líneas verticales de cuadrícula -->
  <line x1="200" y1="84" x2="200" y2="358" stroke="#E5E3DC" stroke-width="0.5"/>
  <line x1="230" y1="84" x2="230" y2="358" stroke="#E5E3DC" stroke-width="0.5"/>
  <line x1="260" y1="84" x2="260" y2="358" stroke="#E5E3DC" stroke-width="0.5"/>
  <line x1="290" y1="84" x2="290" y2="358" stroke="#E5E3DC" stroke-width="0.5"/>
  <line x1="320" y1="84" x2="320" y2="358" stroke="#E5E3DC" stroke-width="0.5"/>
  <line x1="350" y1="84" x2="350" y2="358" stroke="#E5E3DC" stroke-width="0.5"/>
  <line x1="380" y1="84" x2="380" y2="358" stroke="#E5E3DC" stroke-width="0.5"/>
  <line x1="440" y1="84" x2="440" y2="358" stroke="#E5E3DC" stroke-width="0.5"/>
  <line x1="470" y1="84" x2="470" y2="358" stroke="#E5E3DC" stroke-width="0.5"/>
  <line x1="500" y1="84" x2="500" y2="358" stroke="#E5E3DC" stroke-width="0.5"/>
  <line x1="530" y1="84" x2="530" y2="358" stroke="#E5E3DC" stroke-width="0.5"/>
  <line x1="560" y1="84" x2="560" y2="358" stroke="#E5E3DC" stroke-width="0.5"/>
  <line x1="590" y1="84" x2="590" y2="358" stroke="#E5E3DC" stroke-width="0.5"/>
  <line x1="620" y1="84" x2="620" y2="358" stroke="#E5E3DC" stroke-width="0.5"/>

  <!-- Línea horizontal superior tabla -->
  <line x1="10" y1="84" x2="650" y2="84" stroke="#B4B2A9" stroke-width="0.7"/>

  <!-- Fila B1: Definición del proyecto - Día 1 (25 may) -->
  <text x="20" y="103" font-size="10" fill="#2C2C2A">B1. Definición del proyecto</text>
  <rect x="201" y="93" width="28" height="14" fill="#CECBF6" stroke="#534AB7" stroke-width="0.6" rx="2"/>
  <text x="215" y="103" text-anchor="middle" font-size="9" fill="#26215C" font-weight="bold">1d</text>

  <!-- Fila B2: Análisis del dataset - Días 2-3 (26-27 may) -->
  <text x="20" y="123" font-size="10" fill="#2C2C2A">B2. Análisis del dataset</text>
  <rect x="231" y="113" width="58" height="14" fill="#CECBF6" stroke="#534AB7" stroke-width="0.6" rx="2"/>
  <text x="260" y="123" text-anchor="middle" font-size="9" fill="#26215C" font-weight="bold">2d</text>

  <!-- Fila B3: Diseño de la base de datos - Día 4 (28 may) -->
  <text x="20" y="143" font-size="10" fill="#2C2C2A">B3. Diseño de la base de datos</text>
  <rect x="291" y="133" width="28" height="14" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.6" rx="2"/>
  <text x="305" y="143" text-anchor="middle" font-size="9" fill="#04342C" font-weight="bold">1d</text>

  <!-- Fila B4: Pipeline de limpieza - Días 4-5 (28-29 may) (solapa con B3) -->
  <text x="20" y="163" font-size="10" fill="#2C2C2A">B4. Pipeline de limpieza</text>
  <rect x="291" y="153" width="58" height="14" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.6" rx="2"/>
  <text x="320" y="163" text-anchor="middle" font-size="9" fill="#04342C" font-weight="bold">2d</text>

  <!-- Fila B5: Backend - Días 6-7 (30-31 may) -->
  <text x="20" y="183" font-size="10" fill="#2C2C2A">B5. Implementación del backend</text>
  <rect x="351" y="173" width="58" height="14" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.6" rx="2"/>
  <text x="380" y="183" text-anchor="middle" font-size="9" fill="#04342C" font-weight="bold">2d</text>

  <!-- Fila B6: Frontend - Días 8-10 (1-3 jun) -->
  <text x="20" y="203" font-size="10" fill="#2C2C2A">B6. Implementación del frontend</text>
  <rect x="411" y="193" width="88" height="14" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.6" rx="2"/>
  <text x="455" y="203" text-anchor="middle" font-size="9" fill="#04342C" font-weight="bold">3d</text>

  <!-- Fila B7: Modelo predictivo - Día 9 (2 jun) (solapa con B6) -->
  <text x="20" y="223" font-size="10" fill="#2C2C2A">B7. Modelo predictivo</text>
  <rect x="441" y="213" width="28" height="14" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.6" rx="2"/>
  <text x="455" y="223" text-anchor="middle" font-size="9" fill="#4A1B0C" font-weight="bold">1d</text>

  <!-- Fila B8: Recomendador embeddings - Días 11-12 (4-5 jun) -->
  <text x="20" y="243" font-size="10" fill="#2C2C2A">B8. Recomendador con embeddings</text>
  <rect x="501" y="233" width="58" height="14" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.6" rx="2"/>
  <text x="530" y="243" text-anchor="middle" font-size="9" fill="#4A1B0C" font-weight="bold">2d</text>

  <!-- Fila B9: Integración + memoria - Días 13-14 (6-7 jun) -->
  <text x="20" y="263" font-size="10" fill="#2C2C2A">B9. Integración + memoria</text>
  <rect x="561" y="253" width="58" height="14" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.6" rx="2"/>
  <text x="590" y="263" text-anchor="middle" font-size="9" fill="#4A1B0C" font-weight="bold">2d</text>

  <!-- Línea horizontal inferior tabla -->
  <line x1="10" y1="278" x2="650" y2="278" stroke="#B4B2A9" stroke-width="0.7"/>

  <!-- Leyenda de fases -->
  <text x="20" y="310" font-size="10" font-weight="bold" fill="#444441">Fases del proyecto:</text>

  <rect x="20" y="320" width="14" height="10" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5" rx="2"/>
  <text x="40" y="329" font-size="10" fill="#444441">Investigación y análisis (B1, B2)</text>

  <rect x="240" y="320" width="14" height="10" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5" rx="2"/>
  <text x="260" y="329" font-size="10" fill="#444441">Implementación base (B3–B6)</text>

  <rect x="450" y="320" width="14" height="10" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5" rx="2"/>
  <text x="470" y="329" font-size="10" fill="#444441">Modelos ML + cierre (B7–B9)</text>

  <!-- Nota inferior -->
  <text x="20" y="358" font-size="9" font-style="italic" fill="#5F5E5A">Nota: los bloques B3-B4 y B5-B7 presentan solapamiento parcial al retroalimentarse entre sí.</text>
  <text x="20" y="372" font-size="9" font-style="italic" fill="#5F5E5A">Total: 14 días de trabajo en una ventana de 14 días naturales. Margen para contingencias absorbido en B9.</text>

</svg>
