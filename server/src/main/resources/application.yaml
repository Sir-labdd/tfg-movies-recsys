ktor:
  application:
    modules:
      - com.tfg.movies.server.ApplicationKt.module
  deployment:
    port: 8080
    host: 0.0.0.0

# Application-specific configuration. Read by our code, not by Ktor itself.
database:
  jdbcUrl: ${DATABASE_JDBC_URL}
  user: ${DATABASE_USER}
  password: ${DATABASE_PASSWORD}
  poolSize: 10